<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0e14" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Shared Report</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css?v=10" />
</head>
<body>
  <!-- Password gate for this single shared report -->
  <section id="lock" class="lock">
    <div class="lock-card">
      <div class="lock-logo">📄</div>
      <h1>Shared Report</h1>
      <div id="preview" hidden></div>
      <p class="muted">Enter the password you were given to view this report.</p>
      <form id="lock-form" autocomplete="off">
        <input id="pass" type="password" inputmode="text" placeholder="Password"
               autocomplete="off" enterkeyhint="go" />
        <button type="submit" id="view-btn">View report</button>
        <p id="err" class="error" hidden></p>
      </form>
    </div>
  </section>

  <div id="report" class="view detail" hidden></div>

  <script src="share.js?v=10"></script>
</body>
</html>
